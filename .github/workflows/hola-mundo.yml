name: Hola Mundo

on:
  workflow_dispatch:
  push:

jobs:
  ejecutar-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar mensaje
        run: |
          echo "=== INICIO ==="
          python hola_mundo.py
          echo "=== FIN ==="
